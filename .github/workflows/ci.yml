# CI for the v2-redesign branch and main. Replays the stream-json conformance
# fixtures through the parser on every push and PR. Does NOT run the live
# binary — that's a runtime check inside the app.

name: CI

on:
  push:
    branches: [main, v2-redesign]
  pull_request:

jobs:
  conformance:
    name: Stream-json conformance
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Work (Debug)
        run: |
          xcodebuild \
            -scheme Work \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_HARDENED_RUNTIME=NO \
            DEVELOPMENT_TEAM= \
            build

      - name: Run conformance tests
        run: |
          xcodebuild \
            -scheme Work \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            -only-testing:WorkTests \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENABLE_HARDENED_RUNTIME=NO \
            DEVELOPMENT_TEAM= \
            test

      - name: Upload test result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/Logs/Test/*.xcresult
          retention-days: 7
