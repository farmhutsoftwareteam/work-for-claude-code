name: Work
options:
  bundleIdPrefix: com.munyamakosa
  deploymentTarget:
    macOS: "15.0"

settings:
  PRODUCT_NAME: Work
  MARKETING_VERSION: "2.6.1"
  CURRENT_PROJECT_VERSION: "41"
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: minimal
  MACOSX_DEPLOYMENT_TARGET: "15.0"
  ENABLE_HARDENED_RUNTIME: YES
  CODE_SIGN_STYLE: Manual
  CODE_SIGN_IDENTITY: "Developer ID Application: Ryan Katayi (9TUBWSP9WT)"
  DEVELOPMENT_TEAM: 9TUBWSP9WT

packages:
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.13.0
  Inject:
    url: https://github.com/krzysztofzablocki/Inject
    from: 1.5.2

targets:
  Work:
    type: application
    platform: macOS
    sources:
      - Sources
    dependencies:
      - package: swift-markdown-ui
        product: MarkdownUI
      - package: Sparkle
        product: Sparkle
      - package: SwiftTerm
        product: SwiftTerm
      - package: Inject
        product: Inject
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Work.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Default display name. Per-config overrides below.
        BUNDLE_DISPLAY_NAME: Atelier
      configs:
        # Debug builds get a SIBLING bundle ID + a distinct display name so
        # they coexist with the user's production Atelier in /Applications.
        # Without this, macOS treats both binaries as the same app and
        # launching the dev build replaces the production app the user is
        # actively running for daily work.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.munyamakosa.work.dev
          BUNDLE_DISPLAY_NAME: Atelier Dev
          # Inject / InjectionIII hot reload: -interposable lets the injection
          # server swap method bodies in the running Debug build. Debug only.
          OTHER_LDFLAGS: -Xlinker -interposable
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.munyamakosa.work
          BUNDLE_DISPLAY_NAME: Atelier
    info:
      path: Sources/Info.plist
      properties:
        # Display name is the brand surface — what macOS shows in the Dock,
        # menu bar, Apple menu, Force Quit, and every system alert. The bundle
        # identifier and the on-disk .app filename intentionally stay "Work" /
        # com.munyamakosa.work in Release so existing 1.3.x users get the
        # rebrand seamlessly via Sparkle (Sparkle keys on bundle ID, not name).
        # In Debug, both bundle ID and display name fork so the dev build is
        # visible side-by-side with production.
        CFBundleDisplayName: $(BUNDLE_DISPLAY_NAME)
        # CFBundleName drives the macOS menu-bar app title (Apple menu →
        # next to the logo). Defaults to PRODUCT_NAME ("Work") if unset, so
        # the menu bar reads "Work" while the Dock + windows read
        # "Atelier" — pin it here.
        CFBundleName: $(BUNDLE_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: ""
        NSAppleEventsUsageDescription: "Atelier needs to control Terminal to launch Claude sessions."
        LSUIElement: false
        SUFeedURL: https://work.munyamakosa.com/appcast.xml
        SUPublicEDKey: OxlQLub17dx6WhaZ4eF79PE1vfQF+/x4Qo6gt/ThCH0=
        SUScheduledCheckInterval: 3600
        SUEnableAutomaticChecks: true
        # Standard visible flow: check automatically (hourly), then SHOW the
        # update dialog with release notes — the user clicks Install & Relaunch.
        # (true = silent background installs; that hid updates entirely once the
        # v1 badge chrome stopped being shown.)
        SUAutomaticallyUpdate: false
    scheme:
      testTargets:
        - WorkTests

  # Conformance suite (issue #28). Replays captured NDJSON fixtures through
  # the StreamEvent decoder and asserts the parser handles every event shape
  # we've seen from claude. Fixture privacy + capture process documented in
  # conformance/README.md.
  WorkTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/WorkTests
      - path: conformance/fixtures
        type: folder
    dependencies:
      - target: Work
    settings:
      # Override the top-level PRODUCT_NAME=Work so WorkTests doesn't clobber
      # the Work.swiftmodule outputs. Without this, both targets produce a
      # Work.swiftmodule and the build fails with "Multiple commands produce".
      PRODUCT_NAME: WorkTests
      PRODUCT_MODULE_NAME: WorkTests
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      # Match the host app's signing — without this the dynamic loader
      # rejects the test bundle with "different Team IDs".

  # Phase 0 protocol spike (issue #9). Standalone CLI; not part of the shipped
  # app. Run from Xcode (AtelierSpike scheme) to spawn the user's `claude`
  # binary with the full Mode-B flag set and capture the NDJSON event stream
  # to /tmp for fixtures.
  AtelierSpike:
    type: tool
    platform: macOS
    sources:
      - AtelierSpike
    settings:
      PRODUCT_NAME: AtelierSpike
      SKIP_INSTALL: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO

  # Phase 1 ACP-migration smoke test (see memory: atelier-acp-migration).
  # Standalone CLI that compiles the SAME Sources/V2/ACP/ACPClient.swift the
  # app uses and drives a live round-trip against claude-code-acp. Not shipped.
  AtelierSpikeACP:
    type: tool
    platform: macOS
    sources:
      - AtelierSpikeACP
      - Sources/V2/ACP/ACPClient.swift
    settings:
      PRODUCT_NAME: AtelierSpikeACP
      SKIP_INSTALL: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
